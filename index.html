<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor-QuickBooks 스마트 매칭 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel (브라우저에서 React JSX 해석용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (아이콘 라이브러리 cdn) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        // Lucide 아이콘 브라우저 글로벌 객체에서 추출
        const { Upload, FileText, CheckCircle, AlertCircle, ArrowRight, Sparkles, Layers, RefreshCw, Search, Database } = lucide;

        const INITIAL_VENDOR_BILLS = [
            { id: 'VB-001', vendor: 'Sysco Food Services', file: 'sysco_invoice_9921.pdf', status: 'pending', date: '2026-07-15' },
            { id: 'VB-002', vendor: 'US Foods', file: 'usfoods_receipt_774.png', status: 'completed', date: '2026-07-16' },
        ];

        const INITIAL_QB_ITEMS = [
            { itemCode: 'QB-APP-01', description: 'Organic Fuji Apples (Bulk)', sku: 'QB-FUJI-LG', mappedVendorSku: 'SYS-APP-99' },
            { itemCode: 'QB-MILK-02', description: 'Whole Milk 1 Gal', sku: 'QB-WMILK-01', mappedVendorSku: '' },
            { itemCode: 'QB-CHICK-03', description: 'Boneless Chicken Breast', sku: 'QB-CHICK-BNLS', mappedVendorSku: 'USF-CHICK-X' },
        ];

        const EXTRACTED_BILL_ITEMS = [
            { id: 'EXT-01', vendorSku: 'SYS-APP-99', name: 'Fuji Apple Large Count', qty: 5, price: 45.00 },
            { id: 'EXT-02', vendorSku: 'SYS-MILK-X', name: 'Whole Milk Premium 1G', qty: 10, price: 3.80 },
        ];

        function ReconcilerDashboard() {
            const [vendorBills, setVendorBills] = React.useState(INITIAL_VENDOR_BILLS);
            const [qbItems, setQbItems] = React.useState(INITIAL_QB_ITEMS);
            const [extractedItems, setExtractedItems] = React.useState(EXTRACTED_BILL_ITEMS);
            
            const [learningItem, setLearningItem] = React.useState(null);
            const [selectedQbCode, setSelectedQbCode] = React.useState('');
            const [searchTerm, setSearchTerm] = React.useState('');

            // 벤더 파일 업로드 핸들러
            const handleVendorUpload = (e) => {
                if (e.target.files && e.target.files[0]) {
                    const fileName = e.target.files[0].name;
                    const newBill = {
                        id: `VB-${Date.now().toString().slice(-3)}`,
                        vendor: '신규 업로드 벤더',
                        file: fileName,
                        status: 'pending',
                        date: new Date().toISOString().split('T')[0]
                    };
                    setVendorBills([newBill, ...vendorBills]);
                }
            };

            // 퀵북 엑셀 업로드 핸들러
            const handleQbExcelUpload = (e) => {
                if (e.target.files && e.target.files[0]) {
                    alert(`엑셀 파일(${e.target.files[0].name})로부터 아이템 코드, 설명, SKU 구조를 성공적으로 로드했습니다.`);
                }
            };

            // 학습(매핑) 저장
            const handleSaveMapping = () => {
                if (!learningItem || !selectedQbCode) return;

                setQbItems(prev => prev.map(item => {
                    if (item.itemCode === selectedQbCode) {
                        return { ...item, mappedVendorSku: learningItem.vendorSku };
                    }
                    return item;
                }));

                alert(`💡 학습 완료!\n벤더 SKU [${learningItem.vendorSku}]가 퀵북 아이템 [${selectedQbCode}]에 매핑되었습니다. 앞으로 자동 계산됩니다.`);
                setLearningItem(null);
                setSelectedQbCode('');
            };

            const filteredQbItems = qbItems.filter(item => 
                item.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.itemCode.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.sku.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // 실시간 아이콘 렌더링을 위해 Lucide 객체 재생성
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [vendorBills, qbItems, extractedItems, learningItem]);

            return (
                <div className="min-h-screen p-6 max-w-7xl mx-auto">
                    {/* 헤더 */}
                    <div className="mb-8 flex flex-col justify-between gap-4 sm:flex-row sm:items-center border-b border-slate-200 pb-5">
                        <div>
                            <h1 className="text-2xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                                <span className="p-2 bg-indigo-50 text-indigo-600 rounded-lg"><i data-lucide="layers" className="w-6 h-6"></i></span>
                                Vendor-QuickBooks 스마트 매칭 시스템
                            </h1>
                            <p className="text-sm text-slate-500 mt-1">
                                벤더 영수증의 SKU와 퀵북의 SKU가 달라도 학습을 통해 자동으로 매칭하고 정산 금액을 계산합니다.
                            </p>
                        </div>
                    </div>

                    {/* 메인 레이아웃 */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* 왼쪽: 파일 업로드 영역 */}
                        <div className="lg:col-span-1 space-y-6">
                            {/* 벤더 빌 업로드 */}
                            <div className="bg-white p-5 rounded-xl shadow border border-slate-200">
                                <h2 className="text-sm font-semibold mb-3 flex items-center gap-2 text-slate-700">
                                    <i data-lucide="file-text" className="w-4 h-4 text-indigo-500"></i> 1. 벤더 빌 업로드 (PDF / 사진)
                                </h2>
                                <label className="border-2 border-dashed border-slate-200 rounded-lg p-6 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition-colors">
                                    <i data-lucide="upload" className="w-8 h-8 text-slate-400 mb-2"></i>
                                    <span className="text-xs font-medium text-slate-600">파일 선택 또는 드래그</span>
                                    <span className="text-[11px] text-slate-400 mt-1">PDF, PNG, JPG 지원</span>
                                    <input type="file" accept="image/*,application/pdf" className="hidden" onChange={handleVendorUpload} />
                                </label>

                                <div className="mt-4 space-y-2">
                                    {vendorBills.map(bill => (
                                        <div key={bill.id} className="flex items-center justify-between p-2.5 bg-slate-50 rounded-lg text-xs">
                                            <span className="font-medium text-slate-700 truncate max-w-[150px]">{bill.file}</span>
                                            <span className={`px-2 py-0.5 rounded-full text-[10px] font-semibold ${
                                                bill.status === 'completed' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-amber-50 text-amber-700 border border-amber-200'
                                            }`}>
                                                {bill.status === 'completed' ? '분석 완료' : '매핑 대기'}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 퀵북 아이템 업로드 */}
                            <div className="bg-white p-5 rounded-xl shadow border border-slate-200">
                                <h2 className="text-sm font-semibold mb-3 flex items-center gap-2 text-slate-700">
                                    <i data-lucide="database" className="w-4 h-4 text-emerald-500"></i> 2. 퀵북 마스터 아이템 (Excel)
                                </h2>
                                <label className="border-2 border-dashed border-emerald-100 bg-emerald-50/30 rounded-lg p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-50 transition-colors">
                                    <i data-lucide="upload" className="w-6 h-6 text-emerald-500 mb-1"></i>
                                    <span className="text-xs font-medium text-emerald-700">QuickBooks 엑셀 등록</span>
                                    <span className="text-[10px] text-emerald-600/70 mt-0.5">필수: 코드, 설명, SKU 포함</span>
                                    <input type="file" accept=".xlsx, .xls" className="hidden" onChange={handleQbExcelUpload} />
                                </label>
                                <div className="mt-3 text-[11px] text-slate-400 text-center">
                                    현재 매핑 풀에 <strong>{qbItems.length}개</strong>의 아이템 로드됨
                                </div>
                            </div>
                        </div>

                        {/* 오른쪽: 실시간 매칭 테이블 */}
                        <div className="lg:col-span-2">
                            <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <div>
                                        <h2 className="font-semibold text-slate-800 text-base">추출 내역 및 실시간 SKU 매칭 현황</h2>
                                        <p className="text-xs text-slate-400 mt-0.5">영수증 이미지/PDF에서 읽어온 원본 아이템 목록입니다.</p>
                                    </div>
                                    <span className="text-xs bg-indigo-50 text-indigo-700 font-medium px-2 py-1 rounded-md flex items-center gap-1">
                                        <i data-lucide="refresh-cw" className="w-3 h-3"></i> 매칭 엔진 작동중
                                    </span>
                                </div>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-xs border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 uppercase font-semibold border-b border-slate-200 text-[11px]">
                                                <th className="p-4">벤더 원본 SKU</th>
                                                <th className="p-4">추출된 품목명</th>
                                                <th className="p-4">수량/금액</th>
                                                <th className="p-4 text-center">연동 상태 (학습 여부)</th>
                                                <th className="p-4 text-right">매핑 액션</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {extractedItems.map((item) => {
                                                const matchedQbItem = qbItems.find(qb => qb.mappedVendorSku === item.vendorSku);
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4 font-mono font-medium text-indigo-600">{item.vendorSku}</td>
                                                        <td className="p-4 font-medium text-slate-700">{item.name}</td>
                                                        <td className="p-4 text-slate-500">{item.qty}개 / ${(item.qty * item.price).toLocaleString()}</td>
                                                        <td className="p-4 text-center">
                                                            {matchedQbItem ? (
                                                                <span className="inline-flex items-center gap-1 px-2 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full text-[11px] font-medium">
                                                                    <i data-lucide="check-circle" className="w-3 h-3 text-emerald-500"></i> 학습됨 ({matchedQbItem.itemCode})
                                                                </span>
                                                            ) : (
                                                                <span className="inline-flex items-center gap-1 px-2 py-1 bg-rose-50 text-rose-700 border border-rose-200 rounded-full text-[11px] font-medium">
                                                                    <i data-lucide="alert-circle" className="w-3 h-3 text-rose-500"></i> 미학습 SKU
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            {matchedQbItem ? (
                                                                <span className="text-[11px] text-slate-400 font-mono">QB SKU: {matchedQbItem.sku}</span>
                                                            ) : (
                                                                <button 
                                                                    onClick={() => setLearningItem(item)}
                                                                    className="px-2.5 py-1.5 bg-indigo-600 text-white rounded-md text-[11px] font-medium hover:bg-indigo-700 shadow flex items-center gap-1 ml-auto"
                                                                >
                                                                    <i data-lucide="sparkles" className="w-3 h-3"></i> 매핑 학습시키기
                                                                </button>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 학습용 팝업 모달 */}
                    {learningItem && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl border border-slate-200 max-w-md w-full overflow-hidden">
                                <div className="p-4 bg-indigo-50 border-b border-indigo-100 flex items-center justify-between">
                                    <h3 className="font-bold text-slate-900 text-sm flex items-center gap-1">
                                        <i data-lucide="sparkles" className="w-4 h-4 text-indigo-600"></i> 불일치 SKU 학습 매핑 규칙 설정
                                    </h3>
                                    <button onClick={() => setLearningItem(null)} className="text-slate-400 hover:text-slate-600 text-xs">닫기</button>
                                </div>
                                <div className="p-4 space-y-4">
                                    <div className="p-3 bg-slate-50 rounded-lg text-xs space-y-1 border border-slate-200">
                                        <div><span className="text-slate-400">대상 벤더 SKU:</span> <span className="font-mono font-bold text-indigo-600">{learningItem.vendorSku}</span></div>
                                        <div><span className="text-slate-400">추출 품목명:</span> <span className="font-medium text-slate-700">{learningItem.name}</span></div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-xs font-semibold text-slate-700 block">연결할 퀵북 마스터 아이템 지정 (엑셀 로드 데이터)</label>
                                        <div className="relative">
                                            <i data-lucide="search" className="w-3.5 h-3.5 text-slate-400 absolute left-2.5 top-2.5"></i>
                                            <input 
                                                type="text" 
                                                placeholder="코드, 설명, SKU 검색..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full text-xs pl-8 pr-3 py-2 border border-slate-200 rounded-lg focus:outline-indigo-500"
                                            />
                                        </div>
                                        <div className="border border-slate-200 rounded-lg max-h-36 overflow-y-auto divide-y divide-slate-100">
                                            {filteredQbItems.map(qb => (
                                                <label key={qb.itemCode} className="flex items-start gap-2.5 p-2 text-xs cursor-pointer hover:bg-slate-50">
                                                    <input 
                                                        type="radio" 
                                                        name="qbSelect" 
                                                        checked={selectedQbCode === qb.itemCode} 
                                                        onChange={() => setSelectedQbCode(qb.itemCode)}
                                                        className="mt-0.5" 
                                                    />
                                                    <div className="flex-1">
                                                        <div className="flex justify-between font-mono font-semibold text-slate-800">
                                                            <span>{qb.itemCode}</span>
                                                            <span className="text-[10px] text-slate-400">SKU: {qb.sku}</span>
                                                        </div>
                                                        <p className="text-slate-500 text-[11px] truncate">{qb.description}</p>
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="p-3 bg-slate-50 border-t border-slate-100 flex justify-end gap-2 text-xs">
                                    <button onClick={() => setLearningItem(null)} className="px-3 py-1.5 text-slate-500">취소</button>
                                    <button 
                                        disabled={!selectedQbCode} 
                                        onClick={handleSaveMapping}
                                        className={`px-3 py-1.5 text-white rounded-md font-medium ${selectedQbCode ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-slate-300 cursor-not-allowed'}`}
                                    >
                                        학습 및 규칙 저장
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ReconcilerDashboard />);
    </script>
</body>
</html>
